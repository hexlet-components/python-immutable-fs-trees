name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install
        run: |
          pip install uv
          make install
      - name: Run linter
        run: make lint
      - name: Run tests
        run: make test
